<script>
console.log("=== PAGE TWO START ===");
var a = 12;
var b = 4;
var c = (10 - 3) * 2;
console.log("a value:");
console.log(a);
console.log("b value:");
console.log(b);
console.log("c value:");
console.log(c);
console.log("Addition:");
console.log(a + b);
console.log("Subtraction:");
console.log(a - b);
console.log("Multiplication:");
console.log(a * b);
console.log("Division:");
console.log(a / b);
console.log("Precedence test:");
console.log(a - b * 2);
console.log("Parentheses test:");
console.log((a - b) * 2);
if (a == 12) {
console.log("a equals 12");
} else {
console.log("a does not equal 12");
}
if (b < a) {
console.log("b is less than a");
} else {
console.log("b is not less than a");
}
if (c > a) {
console.log("c is greater than a");
} else {
console.log("c is not greater than a");
}
while (1) {
console.log("infinite loop still running on page two");
}
</script>
